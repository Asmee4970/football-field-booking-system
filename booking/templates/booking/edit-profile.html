{% load static %}
<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แก้ไขโปรไฟล์ | Football Field Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'booking/css/profile.css' %}">
</head>

<body>

    <nav class="navbar">
        <div class="logo">
            <span class="logo-main">FOOTBALL</span>
            <span class="logo-sub">FIELD BOOKING</span>
        </div>

        <ul class="nav-menu">
            <li><a href="{% url 'home' %}">สนาม</a></li>
            <li><a href="{% url 'my_booking' %}">การจองของฉัน</a></li>
            <li><a href="{% url 'profile' %}" class="active">โปรไฟล์</a></li>
            <li>
                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn">ออกจากระบบ</button>
                </form>
            </li>
        </ul>
    </nav>

    <div class="container">
        <div class="profile-header">
            <h1>แก้ไขข้อมูลส่วนตัว</h1>
            <p class="subtitle">อัปเดตข้อมูลของคุณให้เป็นปัจจุบัน</p>
        </div>

        <div class="profile-card">
            <form method="POST" class="edit-form">
                {% csrf_token %}

                <div class="info-grid">
                    <div class="info-group">
                        <label>ชื่อ - นามสกุล</label>
                        <input type="text" name="full_name" value="{{ request.user.first_name }}"
                            placeholder="กรอกชื่อ-นามสกุล" class="form-input">
                    </div>

                    <div class="info-group">
                        <label>อีเมล</label>
                        <input type="email" name="email" value="{{ request.user.email }}" placeholder="example@mail.com"
                            class="form-input">
                    </div>

                    <div class="info-group">
                        <label>เบอร์โทรศัพท์</label>
                        <input type="text" name="phone" value="{{ profile.phone }}" placeholder="08X-XXX-XXXX"
                            class="form-input">
                    </div>
                </div>


                <div class="profile-actions">
                    <button type="submit" class="btn-primary">
                        <span>บันทึกการเปลี่ยนแปลง</span>
                    </button>

                    <a href="{% url 'profile' %}" class="btn-outline">
                        <span>ยกเลิก</span>
                    </a>
                </div>

            </form>
        </div>
    </div>

</body>

</html>

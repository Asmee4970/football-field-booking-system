{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Change Password | Football Field Booking</title>

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'booking/css/profile.css' %}">
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">
        <span class="logo-main">FOOTBALL</span>
        <span class="logo-sub">FIELD BOOKING</span>
    </div>

    <ul class="nav-menu">
        <li><a href="{% url 'home' %}">สนาม</a></li>
        <li><a href="{% url 'my_booking' %}">การจองของฉัน</a></li>
        <li><a href="{% url 'profile' %}" class="active">โปรไฟล์</a></li>
        <li>
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="logout-btn">ออกจากระบบ</button>
            </form>
        </li>
    </ul>
</div>

<div class="container">
    <h1>เปลี่ยนรหัสผ่าน</h1>

    <div class="profile-card">
        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>รหัสผ่านปัจจุบัน</label>
                <input type="password" name="old_password" required>
            </div>

            <div class="form-group">
                <label>รหัสผ่านใหม่</label>
                <input type="password" name="new_password1" required>
            </div>

            <div class="form-group">
                <label>ยืนยันรหัสผ่านใหม่</label>
                <input type="password" name="new_password2" required>
            </div>

            <div class="actions">
                <button type="submit" class="btn primary">บันทึกรหัสผ่าน</button>
                <a href="{% url 'profile' %}" class="btn secondary">ยกเลิก</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Register | Football Field Booking</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'booking/css/register.css' %}">
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">
            <span class="logo-main">FOOTBALL</span>
            <span class="logo-sub">FIELD BOOKING</span>
        </div>
    </div>

    <div class="register-box">
        <h1>สมัครสมาชิก</h1>
        <p>Football Field Booking System</p>

        <!-- ✅ ต้องมี method + csrf -->
        <form method="POST">
            {% csrf_token %}

            {% if messages %}
                {% for message in messages %}
                    <p class="error-message">{{ message }}</p>
                {% endfor %}
            {% endif %}

            <div class="form-group">
                <label>ชื่อผู้ใช้</label>
                <input type="text" name="username" placeholder="กรอกชื่อผู้ใช้" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="กรอกอีเมล" required>
            </div>

            <div class="form-group">
                <label>รหัสผ่าน</label>
                <input type="password" name="password1" placeholder="กรอกรหัสผ่าน" required>
            </div>

            <div class="form-group">
                <label>ยืนยันรหัสผ่าน</label>
                <input type="password" name="password2" placeholder="ยืนยันรหัสผ่าน" required>
            </div>

            <button type="submit" class="btn-register">สมัครสมาชิก</button>
        </form>

        <div class="extra-links">
            <a href="{% url 'login' %}">มีบัญชีแล้ว? เข้าสู่ระบบ</a>
        </div>
    </div>

</body>
</html>

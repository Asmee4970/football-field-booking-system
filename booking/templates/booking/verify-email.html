{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Verify Email | Football Field Booking</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
    font-family: 'Prompt', sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:40px;
    border-radius:12px;
    width:380px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border-radius:8px;
    border:1px solid #ddd;
}

button{
    width:100%;
    padding:12px;
    margin-top:16px;
    border:none;
    border-radius:8px;
    background:#16a34a;
    color:white;
    font-weight:600;
}
</style>

</head>

<body>

<div class="box">
    <h2>ยืนยันอีเมล</h2>
    <p>กรอก OTP ที่ส่งไปยังอีเมล</p>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="otp" placeholder="OTP 6 หลัก" required>
        <button type="submit">ยืนยัน</button>
    </form>

    {% if messages %}
        {% for message in messages %}
            <p style="color:red; margin-top:10px;">
                {{ message }}
            </p>
        {% endfor %}
    {% endif %}
</div>

</body>
</html>

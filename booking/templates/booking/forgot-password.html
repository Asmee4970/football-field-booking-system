{% load static %}
<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Forgot Password | Football Field Booking</title>

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'booking/css/forgot-password.css' %}">
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">
        <span class="logo-main">FOOTBALL</span>
        <span class="logo-sub">FIELD BOOKING</span>
    </div>
</div>

<div class="login-box">
    <h1>ลืมรหัสผ่าน</h1>
    <p>กรอก Username และตั้งรหัสผ่านใหม่</p>

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="กรอกชื่อผู้ใช้" required>
        </div>

        <div class="form-group">
            <label>รหัสผ่านใหม่</label>
            <input type="password" name="password1" placeholder="อย่างน้อย 8 ตัวอักษร" required>
        </div>

        <div class="form-group">
            <label>ยืนยันรหัสผ่านใหม่</label>
            <input type="password" name="password2" placeholder="กรอกรหัสผ่านอีกครั้ง" required>
        </div>

        <button type="submit" class="btn-login">
            เปลี่ยนรหัสผ่าน
        </button>
    </form>

    <div class="extra-links">
        <a href="{% url 'login' %}">กลับไปหน้าเข้าสู่ระบบ</a>
    </div>
</div>

</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>อัปเดตสำเร็จ | Football Field Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'booking/css/profile.css' %}">
</head>

<body>

    <nav class="navbar">
        <div class="logo">
            <span class="logo-main">FOOTBALL</span>
            <span class="logo-sub">FIELD BOOKING</span>
        </div>

        <ul class="nav-menu">
            <li><a href="{% url 'home' %}">สนาม</a></li>
            <li><a href="{% url 'my_booking' %}">การจองของฉัน</a></li>
            <li><a href="{% url 'profile' %}" class="active">โปรไฟล์</a></li>
            <li>
                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn">ออกจากระบบ</button>
                </form>
            </li>
        </ul>
    </nav>

    <div class="container">
        <div class="profile-card success-card">
            <div class="success-icon-wrapper">
                <div class="success-circle">
                    <span class="check-mark">L</span>
                </div>
            </div>

            <div class="profile-header">
                <h1>อัปเดตข้อมูลสำเร็จ!</h1>
                <p class="subtitle">ระบบได้ทำการบันทึกข้อมูลใหม่ของคุณเรียบร้อยแล้ว</p>
            </div>

            <div class="divider"></div>

            <div class="profile-actions">
                <a href="{% url 'profile' %}" class="btn-primary">
                    <span>ตกลง / กลับหน้าโปรไฟล์</span>
                </a>
            </div>
        </div>
    </div>

</body>

</html>
